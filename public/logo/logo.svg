<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;display=swap');
      .best {
        font-family: 'Oswald', 'Impact', sans-serif;
        font-weight: 700;
        font-size: 156px;
        fill: #0B2559;
        letter-spacing: -2px;
      }
      .dotcom {
        font-family: 'Oswald', 'Impact', sans-serif;
        font-weight: 700;
        font-size: 60px;
        fill: #ffffff;
        letter-spacing: 1px;
      }
    </style>
  </defs>
  
  <!-- "BEST OF CEBU" text, skewed by -12 degrees to match the slanted appearance -->
  <g transform="translate(60, 250)">
    <text class="best" x="0" y="0" transform="matrix(1, 0, -0.2125, 1, 0, 0)">BEST OF CEBU</text>
  </g>
  
  <!-- "DOT COM" in a light blue square block -->
  <g transform="translate(930, 95)">
    <polygon points="38.2,0 212,0 212,180 0,180" fill="#00AEEF" />
    <g transform="scale(1, 1.05)">
      <text class="dotcom" x="117" y="80" text-anchor="middle" style="font-size: 68px;">DOT</text>
      <text class="dotcom" x="117" y="146" text-anchor="middle" style="font-size: 68px;">COM</text>
    </g>
  </g>
</svg>
